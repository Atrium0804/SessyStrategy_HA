# Home Assistant helpers for the Sessy strategy.
#
# Enable the packages feature in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# then place this file at /config/packages/sessy_helpers.yaml.
# (Or paste the input_boolean block into your existing helpers.)
#
# NOTE: the Home Battery custom integration (custom_components/home_battery) is
# the primary control surface. It owns the master mode selector
# (select.home_battery_mode), the SOC controls (number.home_battery_soc_*), and
# the price thresholds (number.home_battery_price_* / _min_arbitrage_margin).
# This file retains only the season selector plus the legacy enable switch
# (used by the app only when mode_select is not configured).

# Legacy master switch — superseded by input_select.home_battery_mode. The app
# falls back to this only when apps.yaml has no mode_select. Keep it if you have
# not adopted the home_battery package yet.
input_boolean:
  sessy_strategy_enabled:
    name: Sessy strategy enabled
    icon: mdi:battery-sync
    initial: true

input_select:
  sessy_season_mode:
    name: Sessy season mode
    icon: mdi:weather-partly-snowy-rainy
    options:
      - auto
      - summer
      - winter
    initial: auto

# SOC controls and price thresholds now live on the Home Battery device
# (number.home_battery_*), so no input_number helpers are needed here.
