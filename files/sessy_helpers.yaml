# Home Assistant helpers for the Sessy strategy.
#
# Enable the packages feature in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# then place this file at /config/packages/sessy_helpers.yaml.
# (Or paste the input_boolean block into your existing helpers.)
#
# NOTE: the home_battery.yaml package is now the primary control surface. It
# owns the master mode selector (input_select.home_battery_mode) and the SOC
# controls (soc_target / soc_floor / soc_ceiling). This file retains only the
# season selector and the price-threshold sliders, plus the legacy enable
# switch (used by the app only when mode_select is not configured).

# Legacy master switch — superseded by input_select.home_battery_mode. The app
# falls back to this only when apps.yaml has no mode_select. Keep it if you have
# not adopted the home_battery package yet.
input_boolean:
  sessy_strategy_enabled:
    name: Sessy strategy enabled
    icon: mdi:battery-sync
    initial: true

input_select:
  sessy_season_mode:
    name: Sessy season mode
    icon: mdi:weather-partly-snowy-rainy
    options:
      - auto
      - summer
      - winter
    initial: auto

# Optional live-tuning sliders. Reference each from apps.yaml via the matching
# *_entity key (e.g. soc_target_entity: input_number.sessy_soc_target) to adjust
# the value from the HA UI without restarting AppDaemon. Omit any you don't want
# to expose — the app falls back to the static apps.yaml default.
input_number:
  # SOC sliders moved to home_battery.yaml (home_battery_soc_target /
  # _soc_floor / _soc_ceiling). Price thresholds remain here.
  sessy_price_discharge:
    name: Sessy discharge price threshold
    icon: mdi:cash-plus
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: "€/kWh"
    initial: 0.39
  sessy_price_charge:
    name: Sessy cheap-charge price threshold
    icon: mdi:cash-minus
    min: -0.5
    max: 0.2
    step: 0.01
    unit_of_measurement: "€/kWh"
    initial: -0.10
  sessy_min_arbitrage_margin:
    name: Sessy min arbitrage margin
    icon: mdi:scale-balance
    min: 0
    max: 0.5
    step: 0.01
    unit_of_measurement: "€/kWh"
    initial: 0.05
