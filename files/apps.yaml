sessy_strategy:
  module: sessy_strategy
  class: SessyStrategy

  # ── Battery / hardware ──────────────────────────────────────────────
  capacity_wh: 5000          # Battery capacity in Wh
  max_power_w: 2200          # Inverter/battery max power in W — final setpoint clamp

  # ── State-of-charge targets ─────────────────────────────────────────
  soc_target: 70             # % SOC to reach before the evening peak
  soc_floor: 0              # % SOC floor — never discharge below this
  cheap_soc_target: 100      # % SOC ceiling for cheap-price charging

  # ── Pricing ─────────────────────────────────────────────────────────
  surcharge: 0.11            # Import surcharge €/kWh (raw export → import)
  price_discharge: 0.39      # Raw price above which to force discharge
  price_charge: -0.10        # Raw price below which to charge from grid
  min_arbitrage_margin: 0.05 # Min €/kWh spread to justify pre-peak charge

  # ── Adaptive spread window ──────────────────────────────────────────
  # Price-spike discharge and cheap charge spread over this fraction of the
  # contiguous run of hours the price stays past the threshold, floored at
  # min_window_h. Wider spread = lower power = lower round-trip losses.
  window_safety_factor: 0.75 # Fraction of the favourable price run to spread over
  min_window_h: 2.0          # Minimum spread window (hours)
  rerun_debounce_s: 2.0      # Delay before re-running after a live input changes

  # ── Time windows (local hours) ──────────────────────────────────────
  prepeak_start: 16
  prepeak_end: 18
  prepeak_window_h: 2.0
  evening_peak_start: 20
  evening_peak_end: 22

  # ── Seasonal mode (auto | summer | winter) ─────────────────────────
  # auto infers from the hour of today's minimum raw price:
  # daytime minimum => summer, night minimum => winter.
  season_mode: auto
  season_day_start: 8
  season_day_end: 18
  season_auto_fallback: winter

  # Optional winter-specific overrides. If omitted, base values are used.
  soc_floor_winter: 30
  prepeak_start_winter: 14
  prepeak_end_winter: 18
  prepeak_window_h_winter: 4.0

  # ── Entity IDs (map these to your own Sessy entities) ───────────────
  strategy_select: select.sessy_battery_alt9_power_strategy
  grid_target: number.sessy_pwkn_grid_target
  battery_setpoint: number.sessy_battery_alt9_power_setpoint
  soc_sensor: sensor.sessy_battery_alt9_state_of_charge
  price_sensor: sensor.sessy_dnhh_energy_price
  status_sensor: sensor.sessy_strategy_status

  # ── Operating-mode selector (master control) ────────────────────────
  # Provided by the Home Battery custom integration (custom_components/home_battery).
  # Supersedes enable_switch when set. Options normalise to:
  # optimized | grid_setpoint | battery_setpoint | sessy_dynamic | eco | idle.
  mode_select: select.home_battery_mode
  # Single manual setpoint. The mode decides where it lands: grid_setpoint mode
  # writes it to the grid target, battery_setpoint mode to the battery power.
  setpoint_entity: number.home_battery_setpoint
  # Sessy power_strategy option strings used when handing control back.
  # Defaults match the ha-sessy integration — verify in Developer Tools and
  # override if your build uses different option strings.
  sessy_dynamic_option: roi
  eco_option: eco
  idle_option: idle

  # ── Optional live-tuning helpers ────────────────────────────────────
  # These let the app read live values from HA helpers each cycle so you can
  # tune them from a dashboard without restarting AppDaemon. The app falls back
  # to the static values above if a helper is missing or unreadable. Remove any
  # line to keep that value static.
  # SOC numbers and price thresholds all come from the Home Battery integration.
  soc_target_entity: number.home_battery_soc_target
  soc_floor_entity: number.home_battery_soc_floor
  cheap_soc_target_entity: number.home_battery_soc_ceiling
  price_discharge_entity: number.home_battery_price_discharge
  price_charge_entity: number.home_battery_price_charge
  min_arbitrage_margin_entity: number.home_battery_min_arbitrage_margin

  # Optional live season mode selector (input_select with auto/summer/winter).
  # If set, this overrides season_mode from the UI.
  season_mode_entity: input_select.sessy_season_mode

