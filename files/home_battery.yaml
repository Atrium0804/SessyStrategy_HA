# ============================================================
# Home battery package
#
# A single logical "home battery" that wraps the Sessy battery and the
# SessyStrategy_HA AppDaemon app into one intuitive set of controls and
# sensors. Place at /config/packages/home_battery.yaml (enable packages with
# `homeassistant: packages: !include_dir_named packages` in configuration.yaml).
#
# ── Who controls the battery? ────────────────────────────────────────────
# Three actors can command the Sessy, and they all write the SAME physical
# entities (the power_strategy select + the two number setpoints):
#   1. Sessy firmware/integration  — its own schedules (e.g. "dynamic"/roi)
#   2. SessyStrategy_HA (AppDaemon) — rewrites the select + a setpoint every 5m
#   3. The user                    — this package
#
# Because the AppDaemon app reasserts control every 5 minutes, manual control
# only works if the app stands down. The mode selector below is therefore the
# SINGLE master input: the app reads input_select.home_battery_mode first and
# either runs its optimisation, passes a manual setpoint through, or stands
# down. Wire it in apps.yaml via `mode_select: input_select.home_battery_mode`.
#
# ── Mode selector values (app-normalised) ────────────────────────────────
#   Optimized        — SessyStrategy_HA price optimisation (the priority chain)
#   Grid setpoint     — manual zero-on-meter / grid target (app forces nom)
#   Battery setpoint  — manual battery power (app forces api)
#   Sessy dynamic     — hand control back to Sessy's own dynamic schedule
#   Idle              — park the battery
#
# Physical Sessy entities wrapped (override to match your own suffixes):
#   sensor.sessy_battery_alt9_state_of_charge  - SOC %
#   sensor.sessy_battery_alt9_power            - battery power W (+ = discharge)
#   sensor.sessy_pwkn_p1_power                 - grid power W (- = export)
#   sensor.sessy_battery_alt9_system_state     - system state (running/full/…)
#   select.sessy_battery_alt9_power_strategy   - active Sessy power strategy
#   sensor.sessy_strategy_status               - AppDaemon status (active_branch)
#
# Logical entities exposed to the UI:
#   input_select.home_battery_mode             - master mode selector
#   input_number.home_battery_grid_setpoint    - manual grid target (W)
#   input_number.home_battery_battery_setpoint - manual battery power (W)
#   input_number.home_battery_soc_target       - pre-peak SOC target (%)
#   input_number.home_battery_soc_floor        - discharge floor (%)
#   input_number.home_battery_soc_ceiling      - cheap-charge ceiling (%)
#   sensor.home_battery_soc                    - SOC %
#   sensor.home_battery_charge_power           - battery net power (W)
#   sensor.home_battery_grid_power             - grid net power (W)
#   sensor.home_battery_system_state           - Sessy system state
#   sensor.home_battery_active_strategy        - active mode (+ sessy_strategy attr)
#   sensor.home_battery_active_substrategy     - active decision branch
# ============================================================

# ── Controls ────────────────────────────────────────────────────────────
input_select:
  home_battery_mode:
    name: Home battery mode
    icon: mdi:home-battery
    options:
      - Optimized
      - Grid setpoint
      - Battery setpoint
      - Sessy dynamic
      - Eco
      - Idle
    initial: Optimized

input_number:
  # Manual grid target (used only in "Grid setpoint" mode). Negative = import.
  home_battery_grid_setpoint:
    name: Home battery grid setpoint
    icon: mdi:transmission-tower
    min: -10000
    max: 10000
    step: 50
    unit_of_measurement: "W"
    initial: 0

  # Manual battery power (used only in "Battery setpoint" mode).
  # Negative = charge, positive = discharge (matches the app's convention).
  home_battery_battery_setpoint:
    name: Home battery battery setpoint
    icon: mdi:battery-charging
    min: -2200
    max: 2200
    step: 50
    unit_of_measurement: "W"
    initial: 0

  # SOC target reached before the evening peak (pre-peak charge target).
  home_battery_soc_target:
    name: Home battery SOC target
    icon: mdi:battery-charging-90
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 90

  # SOC floor — never discharge below this.
  home_battery_soc_floor:
    name: Home battery SOC floor
    icon: mdi:battery-20
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 20

  # SOC ceiling for cheap/negative-price charging (the app's cheap_soc_target).
  home_battery_soc_ceiling:
    name: Home battery SOC ceiling
    icon: mdi:battery-charging-100
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 100

# ── Logical sensors ───────────────────────────────────────────────────────
template:
  - sensor:
      # Current state of charge mirrored from the Sessy battery.
      - name: "Home battery SOC"
        unique_id: home_battery_soc
        icon: mdi:battery
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: "{{ states('sensor.sessy_battery_alt9_state_of_charge') | float(0) }}"
        availability: "{{ is_number(states('sensor.sessy_battery_alt9_state_of_charge')) }}"

      # Battery net power. Sessy convention: positive = discharge, negative = charge.
      - name: "Home battery charge power"
        unique_id: home_battery_charge_power
        icon: mdi:battery-charging
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.sessy_battery_alt9_power') | float(0) }}"
        availability: "{{ is_number(states('sensor.sessy_battery_alt9_power')) }}"

      # Grid net power at the connection. Negative = export, positive = import.
      - name: "Home battery grid power"
        unique_id: home_battery_grid_power
        icon: mdi:transmission-tower
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.sessy_pwkn_p1_power') | float(0) }}"
        availability: "{{ is_number(states('sensor.sessy_pwkn_p1_power')) }}"

      # Sessy system state (running, full, empty, standby, …).
      - name: "Home battery system state"
        unique_id: home_battery_system_state
        icon: mdi:state-machine
        state: "{{ states('sensor.sessy_battery_alt9_system_state') }}"
        availability: >
          {{ states('sensor.sessy_battery_alt9_system_state')
             not in ['unknown', 'unavailable'] }}

      # Active strategy = the mode the user selected. The underlying Sessy
      # power_strategy (nom/api/roi/idle) is exposed as an attribute so you can
      # confirm what the app actually commanded.
      - name: "Home battery active strategy"
        unique_id: home_battery_active_strategy
        icon: mdi:strategy
        state: "{{ states('input_select.home_battery_mode') }}"
        attributes:
          sessy_strategy: "{{ states('select.sessy_battery_alt9_power_strategy') }}"
          active_branch: "{{ state_attr('sensor.sessy_strategy_status', 'active_branch') }}"

      # Active sub-strategy = the decision branch the app last took
      # (discharge / cheap_charge / prepeak_charge / post_peak_discharge /
      #  default / manual_grid / manual_battery / sessy_dynamic / idle).
      - name: "Home battery active sub-strategy"
        unique_id: home_battery_active_substrategy
        icon: mdi:source-branch
        state: "{{ state_attr('sensor.sessy_strategy_status', 'active_branch') }}"
        availability: >
          {{ state_attr('sensor.sessy_strategy_status', 'active_branch') is not none }}
